spring.application.name=backend

# ===== Server =====
server.port=8080

# ===== DataSource =====
spring.datasource.url=jdbc:mysql://localhost:3306/volunteer_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== MyBatis =====
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=backend
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ===== JWT =====
# 密鑰至少 32 位 (256 bits)，上线前请修改为随机字符串
app.jwt.secret=VolunteerSystem2026VeryLongSecretKeyForHS256AlgorithmMustBe32Chars!
app.jwt.expiration=86400000

# ===== CORS =====
spring.web.cors.allowed-origins=http://localhost:5173

# ===== Flask 雷达图微服务 =====
flask.radar.url=http://localhost:5001/radar
